name: 质量检查

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: 单元、构建和端到端
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: 运行单元测试
        run: npm test

      - name: 运行生产构建
        run: npm run build

      - name: 运行端到端测试
        run: npm run test:e2e
